<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hotel Search</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <h2>Hotel Search</h2>

    <form id="searchForm">
        <input type="text" name="city" placeholder="City">
        <input type="number" name="min_price" placeholder="Min Price" min="0">
        <input type="number" name="max_price" placeholder="Max Price" min="0">
        <input type="number" name="min_rating" placeholder="Min Rating" min="0" max="5" step="0.1">
        <select name="sort">
            <option value="">Sort By</option>
            <option value="price_asc">Price Ascending</option>
            <option value="price_desc">Price Descending</option>
            <option value="rating_asc">Rating Ascending</option>
            <option value="rating_desc">Rating Descending</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="loading">Searching hotels...</div>
    <div id="warning" style="display:none; text-align:center; margin-bottom:15px; color:#dc3545; font-weight:bold;"></div>
    <div id="cache-result"></div>
    <div id="results"></div>

    <script src="scripts/main.js"></script>
</body>
</html>
